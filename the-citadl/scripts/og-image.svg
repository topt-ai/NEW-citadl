    <path d="M800 0V630 M880 0V630 M960 0V630 M1040 0V630 M1120 0V630"/>
    <path d="M800 70H1200 M800 150H1200 M800 230H1200 M800 310H1200 M800 390H1200 M800 470H1200 M800 550H1200"/>
