  <text x="80" y="502" fill="#C8F04B" font-family="'DejaVu Sans','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="76" letter-spacing="-2">We make sure they choose you.</text>

  <!-- footer tag -->
