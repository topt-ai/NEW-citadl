  <text x="80" y="578" fill="#1B2A4A" font-family="'DejaVu Sans','Helvetica Neue',Arial,sans-serif" font-size="20" letter-spacing="3" font-weight="600">CUSTOM BUILT · MLS SYNC · NEVER A TEMPLATE</text>
